<! DOCTYPE html>
<html lang="pt-br">
<head>
  <title>PharmaCalc</title>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="normalize.css-master/normalize.css">
</head>
<style>
 :root {
  --primario: #0C2C55;
  --secundario: #5DD3B6;
 }
 
 * {
  box-sizing: border-box;
  }
  body{
    font-family: 'inter', sans-serif;
    margin: 0;
  }
  h1, .t1, .t2 {
  font-family: 'Montserrat', sans-serif;
    letter-spacing: -0.5px;
  }
  .t2 {
    color: var(--secundario);
  }
  .tudo {
    display: flex;
    width: 100%;
    min-height: 100vh;
    background: white;
    font-family: Inter;
  }

  /*inicio menu lateral */

  aside {
    flex: 1;
    background: var(--primario);
    color: white;
    padding: 0 0 40px 0;
    border: none;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    }
    .titulo-lateral{
      font-weight: 800;
      font-size: 2.5em;
      text-align: center;
    }
    aside ul {
      list-style: none;
      width: 100%;
      padding: 0;
      margin-top: 50px;
    }
    aside li {
      width: 100%;
    }
    .trabalhos button{
       width: 100%;
       display: flex;
       background: transparent;
       color: inherit;
       font-size: 1.5em;
       font-weight: 500;
       padding: 30px 30px;
       text-align: left;
       border: none;
       border-bottom: 1px solid;
       gap: 10px;
       cursor: pointer;
       transition: 0.5s;
       border-left: 4px solid transparent;
       
    }
       .texto-botao {
        display: flex;
        flex-direction: column;
       }
       .trabalhos button:hover {
        background: #f0f0f0;
        color:black;
        border-left: 4px solid black;
        border-bottom-left-radius: 5px;
        border-top-left-radius: 5px;
        border-bottom: 4px solid black;
        padding-left: 20px;
       }
       .baixo-lateral {
        display: flex;
        flex-direction: column;
        text-align: center;
        gap: 10px;
        border-top: 1px solid white;
        padding-top: 20px;
       }

/*inicio menu principal */

  .principal { 
    flex: 2;
   display: flex;
   flex-direction: column;
   padding: 30px 30px 40px 30px;
  }
  h1 {
    font-weight: 700;
    letter-spacing: 0.5;
    text-transform: uppercase;
  }
  form {
     display: flex;
   flex-direction: column;
   height: auto;
   padding-bottom: 30px;
   justify-content:flex-start;
  }
  label {
    display: flex;
    flex-direction: column;
    font-size: 1.2em;
    gap: 5px;
    margin: 30px 0;
  }
  input[name="input"] {
    padding: 20px;
    font-size: 1.2em;
  }
  input[type="submit"] {
    border-radius: 50px;
    border: none;
    background: var(--secundario);
    width: fit-content;
    align-self: center;
    padding: 15px 25px;
    font-size: 1.7em;
    font-weight: 600;
    color: #f1f1f1;
    transition: 0.3s;
    cursor: pointer;
  }
  .mg-ml .ml{
    gap: 5px;
  }
  input[type="submit"]:hover {
    background: #79e0c7;
  }
  .resultado {
    flex: 1;
    height: 100vh;
    display: flex;
    align-items: center;
    padding: 0 10px;
  }
  @keyframes surgir {
    from {
      opacity: 0;
      transform: translateY(10px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }
  .animar-entrada {
    animation: surgir 0.5s ease-out; 
    }
    /*resposta*/
  .resposta {
    border: 3px solid lightblue;
    border-radius: 5px;
    height: 50%;
    width: 100%;
    display:none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  h3 {
   font-weight: 200;
   font-size: 1.5em; 
  }
  h4 {
    color: var(--secundario);
    font-weight: 800;
    font-size: 3.5em;
  }
  .desc {
   font-size: 1.5em;
  }
</style>
<body>
  <div class="tudo">
    <aside> <!--menu lateral-->
      <div class="topo-lateral">
        <p class="titulo-lateral"><span class="t1">Pharma</span><span class="t2">Calc</span></p>
        <ul class="trabalhos">
          <li><button onclick="renderDosagem()">
            <i class="fa-solid fa-pills"></i>
            <div class="texto-botao">
              <span>Calculo de dosagem</span>
              <span>Mg para Ml</span>
            </div></button></li>
          <li><button onclick="renderDuracao()"><i class="fa-regular fa-clock"></i>Duração de tratamento</button></li>
          <li><button onclick="renderGotejar()"><i class="fa-solid fa-droplet"></i>Gotejamento/Infusão</button></li>
        </ul>
        </div>
        <div class="baixo-lateral">
          <span><strong>Por Michael Teixeira</strong></span>
          <span>Integrações basicas de HTML, CSS e JavaScript</span>
        </div>
    </aside>

    <!--menu principal-->
    <main class="principal" id="calculadora"> 
      <div class=animar-entrada>
  <h1>Calculo de dosagem</h1>
      <form class="calc-dosagem" id="calc-dosagem"> <!--mg/(mg/ml)=ml-->
        <label>Informe o medicamento:
          <input type="text" class="medicamento" id="CalcMedicamento" name="input" placeholder="nome do Remedio" required>
        </label>
        <label>Informe a quantidade de Miligramas (Mg):
          <input type="number" class="mg" id="inMg" name="input" placeholder="Dose prescrita" required>
        </label>
        <div class="mg-ml">
        <label class="mg">Informe a concentração (Mg):
          <input type="number" class="mg" id="conc_mg" name="input" placeholder="Concentração da unidade" required>
        </label>
        <label class="ml">Informe a concentração (Ml):
          <input type="number" class="ml" id="conc_ml" name="input" placeholder="Concentração da unidade" required>
        </div>
        </label>
        <input type="submit" value="Calcular dosagem">
      </form>
      </div>
    </main>

    <section class="resultado">
      <div class="resposta" id="resposta">
        <h3></h3>
        <h4></h4>
        <p class ="desc" id="desc"></p>
      </div>
    </section>
  </div>  
  <script src="javascript/menu.js"></script>
</body>
</html>
